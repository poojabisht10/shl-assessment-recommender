services:
  - type: web
    name: shl-assessment-recommender
    runtime: python

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: GEMINI_API_KEY
        sync: false

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    autoDeploy: true
